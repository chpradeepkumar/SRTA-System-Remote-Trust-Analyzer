<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SRTA Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Scanning...</p>
    </div>

    <div class="bg"></div>

    <div class="container">

        <header class="top">
            <h1>⚡ SRTA Dashboard</h1>
            <button onclick="runScan()">Scan System</button>
        </header>

        <section class="stats">
            <div class="card">
                <p>Trust</p>
                <h2 id="trustScore">--</h2>
            </div>
            <div class="card">
                <p>Threat</p>
                <h2 id="threatLevel">--</h2>
            </div>
            <div class="card">
                <p>Processes</p>
                <h2 id="procCount">--</h2>
            </div>
            <div class="card">
                <p>Time</p>
                <h2 id="scanTime">--</h2>
            </div>
        </section>

        <section class="main">

            <div class="table-box">
                <h3>Process Analysis</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>CPU</th>
                            <th>Trust</th>
                            <th>Kill</th>
                        </tr>
                    </thead>
                    <tbody id="table"></tbody>
                </table>
            </div>

            <div class="side">

                <div class="card">
                    <h3>🧠 Analysis</h3>
                    <ul id="analysis"></ul>
                </div>

                <div class="card">
                    <h3>🌐 Connections</h3>
                    <div id="connections"></div>
                </div>

            </div>

        </section>

    </div>

    <script>

        function showLoader() {
            loader.style.display = "flex";
        }

        function hideLoader() {
            loader.style.display = "none";
        }

        function runScan() {

            showLoader();

            setTimeout(() => {

                fetch("/scan")
                    .then(r => r.json())
                    .then(data => {

                        let total = 0;
                        let rows = "";

                        data.forEach(p => {
                            total += p.score;

                            let color = p.score < 40 ? "#ff3b3b" : p.score < 70 ? "#facc15" : "#22c55e";

                            rows += `
<tr class="fade" style="border-left:4px solid ${color}">
<td>${p.name}</td>
<td>${p.cpu}</td>
<td>${p.score}</td>
<td><button onclick="killProc(${p.pid}, this)">X</button></td>
</tr>`;
                        });

                        table.innerHTML = rows;

                        let avg = Math.round(total / data.length);

                        trustScore.innerText = avg;
                        procCount.innerText = data.length;
                        scanTime.innerText = new Date().toLocaleTimeString();

                        let lvl = "SAFE";
                        if (avg < 50) lvl = "HIGH";
                        else if (avg < 80) lvl = "MEDIUM";

                        threatLevel.innerText = lvl;

                        /* SIMPLE ANALYSIS */
                        let analysis = [];

                        if (avg < 50) analysis.push("System risk is high");
                        if (data.some(p => p.cpu > 80)) analysis.push("High CPU usage detected");

                        if (analysis.length === 0) analysis.push("System looks stable");

                        document.getElementById("analysis").innerHTML =
                            analysis.map(x => `<li>${x}</li>`).join("");

                        hideLoader();

                    });

                /* CONNECTIONS (LIMITED) */
                fetch("/connections")
                    .then(r => r.json())
                    .then(d => {
                        connections.innerHTML = "";
                        let unique = [...new Set(d.map(x => x.remote))];
                        unique.slice(0, 5).forEach(ip => {
                            connections.innerHTML += `<div>${ip}</div>`;
                        });
                    });

            }, 1200);
        }

        /* KILL WITHOUT AUTO SCAN */
        function killProc(pid, btn) {

            let row = btn.closest("tr");
            row.classList.add("fade-out");
            btn.disabled = true;

            setTimeout(() => {
                fetch("/kill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pid: pid })
                });
            }, 400);
        }

    </script>

</body>

</html>
